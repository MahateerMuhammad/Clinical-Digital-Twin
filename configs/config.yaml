project:
  name: Clinical Digital Twin
  version: 1.0.0
  description: AI-powered Personalized Patient Simulator using MIMIC-IV
  random_seed: 42
paths:
  raw:
    hosp: data/raw/hosp
    icu: data/raw/icu
    notes: data/raw/note
  interim: data/interim
  processed: data/processed
  external: data/external
  reports: reports
  figures: reports/figures
  tables: reports/tables
  logs: logs
logging:
  level: INFO
  log_file: logs/pipeline.log
  max_bytes: 10485760
  backup_count: 5
io:
  chunk_size: 500000
  parquet_compression: snappy
  parquet_engine: pyarrow
tables:
  patients:
    file: patients.csv
    source: hosp
    date_cols:
    - dod
    id_cols:
    - subject_id
    cat_cols:
    - gender
    - anchor_year_group
    large: false
  admissions:
    file: admissions.csv
    source: hosp
    date_cols:
    - admittime
    - dischtime
    - deathtime
    - edregtime
    - edouttime
    id_cols:
    - subject_id
    - hadm_id
    cat_cols:
    - admission_type
    - admission_location
    - discharge_location
    - insurance
    - language
    - marital_status
    - race
    large: false
  diagnoses_icd:
    file: diagnoses_icd.csv
    source: hosp
    date_cols: []
    id_cols:
    - subject_id
    - hadm_id
    - seq_num
    - icd_code
    cat_cols:
    - icd_version
    large: false
  d_icd_diagnoses:
    file: d_icd_diagnoses.csv
    source: hosp
    date_cols: []
    id_cols: []
    cat_cols:
    - icd_version
    large: false
  procedures_icd:
    file: procedures_icd.csv
    source: hosp
    date_cols:
    - chartdate
    id_cols:
    - subject_id
    - hadm_id
    - seq_num
    - icd_code
    cat_cols:
    - icd_version
    large: false
  d_icd_procedures:
    file: d_icd_procedures.csv
    source: hosp
    date_cols: []
    id_cols: []
    cat_cols:
    - icd_version
    large: false
  labevents:
    file: labevents.csv
    source: hosp
    date_cols:
    - charttime
    - storetime
    id_cols:
    - subject_id
    - hadm_id
    - labevent_id
    - specimen_id
    cat_cols:
    - flag
    - priority
    large: true
  d_labitems:
    file: d_labitems.csv
    source: hosp
    date_cols: []
    id_cols:
    - itemid
    cat_cols:
    - fluid
    - category
    large: false
  prescriptions:
    file: prescriptions.csv
    source: hosp
    date_cols:
    - starttime
    - stoptime
    id_cols: []
    cat_cols:
    - drug_type
    - drug
    - route
    - form_rx
    - dose_unit_rx
    - form_unit_disp
    large: true
  pharmacy:
    file: pharmacy.csv
    source: hosp
    date_cols:
    - starttime
    - stoptime
    - entertime
    - verifiedtime
    - expirationdate
    id_cols:
    - subject_id
    - hadm_id
    - pharmacy_id
    cat_cols:
    - medication
    - proc_type
    - status
    - route
    - frequency
    - infusion_type
    large: true
  emar:
    file: emar.csv
    source: hosp
    date_cols:
    - charttime
    - scheduletime
    - storetime
    id_cols: []
    cat_cols:
    - medication
    - event_txt
    large: true
  emar_detail:
    file: emar_detail.csv
    source: hosp
    date_cols: []
    id_cols: []
    cat_cols:
    - administration_type
    - barcode_type
    - route
    large: true
  icustays:
    file: icustays.csv
    source: icu
    date_cols:
    - intime
    - outtime
    id_cols:
    - subject_id
    - hadm_id
    - stay_id
    cat_cols:
    - first_careunit
    - last_careunit
    large: false
  chartevents:
    file: chartevents.csv
    source: icu
    date_cols:
    - charttime
    - storetime
    id_cols: []
    cat_cols:
    - valueuom
    large: true
  d_items:
    file: d_items.csv
    source: icu
    date_cols: []
    id_cols:
    - itemid
    cat_cols:
    - linksto
    - category
    - param_type
    - unitname
    large: false
  inputevents:
    file: inputevents.csv
    source: icu
    date_cols:
    - starttime
    - endtime
    - storetime
    id_cols: []
    cat_cols:
    - ordercategoryname
    - secondaryordercategoryname
    - ordercomponenttypedescription
    - ordercategorydescription
    - statusdescription
    - amountuom
    - rateuom
    large: true
  outputevents:
    file: outputevents.csv
    source: icu
    date_cols:
    - charttime
    - storetime
    id_cols: []
    cat_cols:
    - valueuom
    large: true
  discharge:
    file: discharge.csv
    source: notes
    date_cols:
    - charttime
    - storetime
    id_cols:
    - note_id
    - subject_id
    - hadm_id
    cat_cols:
    - note_type
    large: true
    text_col: text
  radiology:
    file: radiology.csv
    source: notes
    date_cols:
    - charttime
    - storetime
    id_cols:
    - note_id
    - subject_id
    - hadm_id
    cat_cols:
    - note_type
    large: true
    text_col: text
    optional: true
  radiology_detail:
    file: radiology_detail.csv
    source: notes
    date_cols: []
    id_cols:
    - note_id
    - subject_id
    - field_name
    - field_value
    - field_ordinal
    cat_cols:
    - field_name
    large: true
    text_col: field_value
    optional: true
pipeline:
  max_chunks_large_tables: null
  eda_sample_rows: 50000
  eda_max_chunks_per_large_table: 3
  skip_tables: []
  full_load: true
